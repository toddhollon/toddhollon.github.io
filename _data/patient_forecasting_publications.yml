main:
  - title: A machine learning approach to predict early outcomes after pituitary adenoma surgery
    authors: Todd C Hollon, Adish Parikh, Balaji Pandian, Jamaal Tarpeh, Daniel A Orringer, Ariel L Barkan, Erin L McKean, Stephen E Sullivan
    conference: JOURNAL OF NEUROSURGERY · 2018
    description: >
      This study develops a machine learning model to forecast **early postoperative outcomes** after pituitary adenoma surgery, supporting risk stratification and perioperative planning.
    venue_logo: "/assets/img/venues/jns_logo.png"
    url: https://doi.org/10.3171/2018.8.focus18268
    pdf: https://mlins-site.s3.amazonaws.com/pdf/papers/hollon2018machine.pdf
    image: "/assets/img/paper_logo/hollon2018machine.webp"
    pills:
      - title: PDF
        link: https://mlins-site.s3.amazonaws.com/pdf/papers/hollon2018machine.pdf

  - title: 'Outcome of Transsphenoidal Surgery for Cushing Disease: A Single-Center Experience Over 32 Years'
    authors: William F Chandler, Ariel L Barkan, Todd Hollon, Alla Sakharova, Jayson Sack, Barunashish Brahma, David E Schteingart
    conference: NEUROSURGERY · 2016
    description: >
      This long-term single-center analysis reports outcomes of transsphenoidal surgery for **Cushing disease**, identifying patterns in remission and recurrence over three decades of care.
    venue_logo: "/assets/img/venues/neurosurgery.png"
    url: https://doi.org/10.1227/neu.0000000000001011
    pdf: https://mlins-site.s3.amazonaws.com/pdf/papers/chandler2016outcome.pdf
    image: "/assets/img/paper_logo/chandler2016outcome.webp"
    pills:
      - title: PDF
        link: https://mlins-site.s3.amazonaws.com/pdf/papers/chandler2016outcome.pdf

  - title: 'Ventriculoscopic Surgery for Cystic Retrochiasmatic Craniopharyngiomas: Indications, Surgical Technique, and Short-Term Patient Outcomes'
    authors: Todd C Hollon, Luis E Savastano, David Altshuler, Ariel L Barkan, Stephen E Sullivan
    conference: OPERATIVE NEUROSURGERY · 2017
    description: >
      This paper outlines indications and technique for ventriculoscopic treatment of cystic retrochiasmatic craniopharyngiomas and reports **short-term clinical outcomes** in treated patients.
    venue_logo: "/assets/img/venues/operative_neurosurgery.png"
    url: https://doi.org/10.1093/ons/opx220
    pdf: https://mlins-site.s3.amazonaws.com/pdf/papers/hollon2017ventriculoscopic.pdf
    image: "/assets/img/paper_logo/hollon2017ventriculoscopic.webp"
    pills:
      - title: PDF
        link: https://mlins-site.s3.amazonaws.com/pdf/papers/hollon2017ventriculoscopic.pdf

  - title: Clinical Factors Associated With ICU-Specific Care Following Supratentoral Brain Tumor Resection and Validation of a Risk Prediction Score
    authors: Lynze R Franko, Todd Hollon, Joseph Linzey, Christopher Roark, Venkatakrishna Rajajee, Kyle Sheehan, Magnus Teig, Shawn Hervey-Jumper, Jason Heth, Daniel Orringer, Craig A Williamson
    conference: CRITICAL CARE MEDICINE · 2018
    description: >
      This work identifies predictors of **ICU-level needs** after supratentorial brain tumor resection and validates a risk score to guide postoperative triage and resource allocation.
    url: https://doi.org/10.1097/ccm.0000000000003207
    pdf: https://mlins-site.s3.amazonaws.com/pdf/papers/franko2018clinical.pdf
    image: "/assets/img/paper_logo/franko2018clinical.webp"
    pills:
      - title: PDF
        link: https://mlins-site.s3.amazonaws.com/pdf/papers/franko2018clinical.pdf

  - title: "Supratentorial hemispheric ependymomas: an analysis of 109 adults for survival and prognostic factors"
    authors: Todd Hollon, Vincent Nguyen, Brandon W Smith, Spencer Lewis, Larry Junck, Daniel A Orringer
    conference: JOURNAL OF NEUROSURGERY · 2016
    description: >
      This cohort study of 109 adults with supratentorial hemispheric ependymoma characterizes **survival outcomes and prognostic factors** to inform treatment planning and follow-up.
    venue_logo: "/assets/img/venues/jns_logo.png"
    url: https://doi.org/10.3171/2015.7.jns151187
    pdf: https://mlins-site.s3.amazonaws.com/pdf/papers/hollon2016superatentorial.pdf
    image: "/assets/img/paper_logo/hollon2016superatentorial.webp"
    pills:
      - title: PDF
        link: https://mlins-site.s3.amazonaws.com/pdf/papers/hollon2016superatentorial.pdf
