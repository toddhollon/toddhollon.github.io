  - title: Spatiotemporal analysis of glioma heterogeneity reveals COL1A1 as an actionable target to disrupt tumor progression
    authors: Andrea Comba, Syed M. Faisal, Patrick J. Dunn, Anna E. Argento, Todd C. Hollon, Wajd N. Al-Holou, Maria Luisa Varela, Daniel B. Zamler, Gunnar L. Quass, Pierre F. Apostolides, Clifford Abel II, Christine E. Brown, Phillip E. Kish, Alon Kahana, Celina G. Kleer, Sebastien Motsch, Maria G. Castro and Pedro R. Lowenstein
    conference: NATURE COMMUNICATIONS · 2022
    description: >
      **Spatiotemporal** profiling of glioma heterogeneity implicates **COL1A1** in the tumor microenvironment as a tractable target to slow progression, connecting matrix biology to therapeutic opportunity. The **MLiNS** lab contributed a **semantic segmentation** model to detect **oncostreams** in brain tumor microscopy images, supporting quantitative analysis of tumor architecture.
    venue_logo: "/assets/img/venues/nature_comms.png"
