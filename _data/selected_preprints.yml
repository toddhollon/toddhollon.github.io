main:
  - title: Health system learning achieves generalist neuroimaging models
    authors: Akhil Kondepudi, Akshay Rao, Chenhui Zhao, Yiwei Lyu, Samir Harake, Soumyanil Banerjee, Rushikesh Joshi, Anna-Katharina Meissner, Renly Hou, Cheng Jiang, Asadur Chowdury, Ashok Srinivasan, Brian Athey, Vikas Gulani, Aditya Pandey, Honglak Lee, and Todd Hollon
    conference: arXiv 2026
    description: >
      **NeuroVFM** is a visual foundation model trained on 5.24M clinical MRI and CT volumes via *health system learning*, a paradigm that leverages uncurated data from routine care. Using a scalable volumetric joint-embedding predictive architecture, it delivers state-of-the-art radiologic diagnosis and report generation with interpretable visual grounding, surpassing frontier models in accuracy, triage, and expert preference while reducing hallucinations.
    image: /assets/img/paper_logo/neurovfm.png
    venue_logo: "/assets/img/venues/arxiv-logo.png"
    url: https://arxiv.org/abs/2511.18640
    pdf: https://arxiv.org/pdf/2511.18640
    demo: https://neurovfm.mlins.org/
