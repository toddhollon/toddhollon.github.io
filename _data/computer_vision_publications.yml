  - title: Super-resolution of biomedical volumes with 2D supervision
    authors: Cheng Jiang, Alexander Gedeon, Yiwei Lyu, Eric Landgraf, Yufeng Zhang, Xinhai Hou, Akhil Kondepudi, Asadur Chowdury, Honglak Lee, and Todd C. Hollon
    conference: CVPR WORKSHOP · 2024
    description: >
      This work proposes **Masked Slice Diffusion for Super-Resolution (MSDSR)**, a strategy for volumetric biomedical super-resolution trained with only 2D supervision, enabling high-quality 3D reconstruction when fully paired 3D labels are scarce.
