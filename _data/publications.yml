- title: 'CodeV: Code with Images for Faithful Visual Reasoning via Tool-Aware Policy Optimization'
  authors: Xinhai Hou, Shaoyuan Xu, Manan Biyani, Moyan Li, Jia Liu, Todd C. Hollon, and Bryan Wang
  conference: COMPUTER VISION AND PATTERN RECOGNITION · 2026
  description: >
    Recent visual agents can score well while using image tools unfaithfully-e.g., cropping irrelevant regions or ignoring tool outputs. **CodeV** represents tools as executable Python code and trains with Tool-Aware Policy Optimization (TAPO), using process-level rewards on visual tool inputs and outputs to improve both accuracy and faithful tool use on search and broader multimodal benchmarks.
  venue_logo: "/assets/img/venues/cvpr.png"
  pdf: https://arxiv.org/pdf/2511.19661
  code: https://github.com/RenlyH/CodeV
  image: "/assets/img/paper_logo/codev2026.png"
