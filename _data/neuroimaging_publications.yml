    demo: https://prima.mlins.org/
    url: https://www.nature.com/articles/s41551-025-01608-0

  - title: Extending SEEDS to a Supervoxel Algorithm for Medical Image Analysis
    authors: Chenhui Zhao, Yan Jiang, and Todd C. Hollon
    conference: ARXIV · 2025
    description: >
      This work extends the SEEDS superpixel algorithm from 2D to 3D volumes as **3D SEEDS**, reporting substantially faster supervoxel generation and improved segmentation quality across diverse medical imaging tasks.
    venue_logo: "/assets/img/venues/arxiv-logo.png"
    url: https://arxiv.org/abs/2502.02409
    pdf: https://arxiv.org/pdf/2502.02409
    image: "/assets/img/paper_logo/zhao2025_3d_seeds.png"
    pills:
